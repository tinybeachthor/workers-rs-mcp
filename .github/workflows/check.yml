name: Check

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.3
        with:
          target: wasm32-unknown-unknown
          toolchain: stable

      - name: Cargo check
        run: cargo check --target wasm32-unknown-unknown
